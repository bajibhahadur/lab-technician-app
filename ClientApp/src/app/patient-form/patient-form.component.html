<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="text-primary"><i class="bi bi-people-fill"></i> Patient Management</h2>
    <button class="btn btn-primary" (click)="toggleForm()">
      {{ showForm ? 'Cancel' : '+ Register New Patient' }}
    </button>
  </div>

  <div *ngIf="message" class="alert alert-success alert-dismissible">{{ message }}</div>

  <div *ngIf="showForm" class="card shadow mb-4">
    <div class="card-header bg-primary text-white">
      <h5 class="mb-0">New Patient Registration</h5>
    </div>
    <div class="card-body">
      <form (ngSubmit)="savePatient()">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Full Name *</label>
            <input type="text" class="form-control" [(ngModel)]="newPatient.name" name="name" required placeholder="Enter patient name">
          </div>
          <div class="col-md-3">
            <label class="form-label">Age *</label>
            <input type="number" class="form-control" [(ngModel)]="newPatient.age" name="age" required min="1" max="120" placeholder="Age">
          </div>
          <div class="col-md-3">
            <label class="form-label">Gender *</label>
            <select class="form-select" [(ngModel)]="newPatient.gender" name="gender" required>
              <option value="Male">Male</option>
              <option value="Female">Female</option>
              <option value="Other">Other</option>
            </select>
          </div>
        </div>
        <div class="mt-3">
          <button type="submit" class="btn btn-success me-2">Save Patient</button>
          <button type="button" class="btn btn-secondary" (click)="toggleForm()">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <div class="card shadow">
    <div class="card-header bg-light">
      <h5 class="mb-0">Registered Patients</h5>
    </div>
    <div class="card-body p-0">
      <div *ngIf="patients.length === 0" class="text-center text-muted p-4">
        No patients registered yet. Click "Register New Patient" to add one.
      </div>
      <table *ngIf="patients.length > 0" class="table table-hover mb-0">
        <thead class="table-light">
          <tr>
            <th>#</th>
            <th>Name</th>
            <th>Age</th>
            <th>Gender</th>
            <th>Date Registered</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let patient of patients; let i = index">
            <td>{{ i + 1 }}</td>
            <td>{{ patient.name }}</td>
            <td>{{ patient.age }}</td>
            <td>{{ patient.gender }}</td>
            <td>{{ patient.date | date:'mediumDate' }}</td>
            <td>
              <button class="btn btn-sm btn-primary me-1" (click)="enterTest(patient.id!)">Enter Test</button>
              <button class="btn btn-sm btn-info" (click)="viewReports(patient.id!)">View Reports</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
